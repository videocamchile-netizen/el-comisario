name: Actualizar episodios

on:
  schedule:
    # 09:00 UTC = 05:00/06:00 Chile (según horario de verano) — el programa
    # es los domingos en la noche, así que llega con margen de sobra.
    - cron: "0 9 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Revisar YouTube y actualizar episodios
        run: python3 scripts/actualizar_episodios.py

      - name: Commitear y pushear si hubo cambios
        run: |
          git config user.name "el-comisario-bot"
          git config user.email "actions@users.noreply.github.com"
          if git diff --quiet; then
            echo "Sin cambios, no se commitea nada."
            exit 0
          fi
          git add episodios-data.json episodios.html
          git commit -m "Actualizar episodios automáticamente"
          git push
